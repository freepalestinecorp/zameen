<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Details | Zameen</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(255, 255, 255, 0.2);
    }

    body {
      background-color: #f8fafc;
    }

    .property-detail-container { 
      max-width: 1300px; 
      margin: 2rem auto; 
      padding: 0 2rem; 
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
    }

    @keyframes slideUp { 
      from { opacity: 0; transform: translateY(30px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    /* Gallery Redesign - Classic Premium */
    .gallery-container {
      margin-bottom: 3rem;
    }

    .main-image-viewport {
      width: 100%;
      height: 600px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      margin-bottom: 1.5rem;
      background: #eee;
    }

    .main-image-viewport img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s ease;
    }

    .thumbnails-row {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--primary) transparent;
    }

    .thumbnail-item {
      flex: 0 0 120px;
      height: 80px;
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
      opacity: 0.6;
    }

    .thumbnail-item:hover, .thumbnail-item.active {
      opacity: 1;
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .thumbnail-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Layout */
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 3rem;
      align-items: start;
    }

    .main-content {
      background: var(--bg-panel);
      padding: 3rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .sidebar {
      position: sticky;
      top: 100px;
    }

    /* Details Styling */
    .header-area {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 2rem;
    }

    .price-display {
      font-size: 3.2rem;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: -1.5px;
      margin-bottom: 0.5rem;
    }

    .property-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    .location-text {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 500;
    }

    .highlight-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin: 2.5rem 0;
    }

    .highlight-item {
      background: var(--bg-main);
      padding: 1.5rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      text-align: center;
      transition: var(--transition);
    }

    .highlight-item:hover {
      border-color: var(--primary);
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }

    .highlight-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .highlight-value {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-main);
    }

    .description-box {
      line-height: 1.8;
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .description-box h3 {
      margin-bottom: 1.25rem;
      color: var(--text-main);
    }

    /* Agent Sidebar Card */
    .agent-card-premium {
      background: var(--bg-panel);
      padding: 2.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-color);
      text-align: center;
    }

    .agent-img {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, var(--primary) 0%, #00d268 100%);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
      box-shadow: 0 10px 20px rgba(0, 166, 81, 0.2);
    }

    .agent-info h3 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .agent-info p { color: var(--primary); font-weight: 600; font-size: 0.9rem; margin-bottom: 2rem; }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem;
    }

    @media (max-width: 1100px) {
      .content-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .gallery-section { height: 400px; }
    }

    @media (max-width: 768px) {
      .gallery-section { grid-template-columns: 1fr; height: 300px; }
      .side-photos { display: none; }
      .price-display { font-size: 2.4rem; }
      .property-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="index.html" class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary)"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Zameen
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="buy.html">Buy</a></li>
      <li><a href="sell.html">Sell</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div id="auth-nav-container" style="display: flex; gap: 1rem; align-items: center;">
      <a href="sell.html" class="btn btn-primary" style="padding: 0.5rem 1.25rem; font-size: 0.9rem;">List Property</a>
      <button id="nav-login-btn" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.9rem;" onclick="toggleModal('loginModal')">Login</button>
    </div>
  </nav>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal"></div>

  <main class="property-detail-container" id="detail-view">
    <div style="height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="spinner"></div>
        <h2 style="color: var(--text-muted);">Fetching Premium Listing...</h2>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/main.js"></script>
  <script>
    const initProperty = function() {
      setTimeout(async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const propId = urlParams.get('id');
        const container = document.getElementById('detail-view');

        if (!propId) {
          container.innerHTML = '<div style="text-align:center; padding: 5rem 2rem;"><h1 style="font-size: 4rem;">404</h1><h2>Property Not Found</h2><a href="buy.html" class="btn btn-primary" style="margin-top: 2rem;">Back to Listings</a></div>';
          return;
        }

        try {
          const { data, error } = await sb.from('properties').select('*').eq('id', propId).single();
          if (error) throw error;

          // Attempt to increment views
          try {
             const currentViews = data.views || 0;
             await sb.from('properties').update({ views: currentViews + 1 }).eq('id', propId);
          } catch (e) { console.log("View tracking failed"); }

          const images = data.image_url ? data.image_url.split(',') : ['https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3'];
          
          container.innerHTML = `
            <!-- Gallery Section -->
            <div class="gallery-container">
              <div class="main-image-viewport">
                <img id="main-img-view" src="${images[0]}" alt="Property Main Image">
              </div>
              ${images.length > 1 ? `
              <div class="thumbnails-row">
                ${images.map((img, idx) => `
                  <div class="thumbnail-item ${idx === 0 ? 'active' : ''}" onclick="updateMainImage('${img}', this)">
                    <img src="${img}" alt="Thumbnail ${idx + 1}">
                  </div>
                `).join('')}
              </div>
              ` : ''}
            </div>

            <div class="content-grid">
              <div class="main-content">
                <div class="header-area">
                  <div style="display: flex; gap: 0.75rem; margin-bottom: 1.5rem;">
                    <span class="badge" style="position:static;">For ${data.purpose}</span>
                    <span class="badge" style="position:static; background: var(--bg-panel-alt); color: var(--text-main); box-shadow: none; border: 1px solid var(--border-color);">${data.property_type}</span>
                  </div>
                  <div class="price-display">PKR ${Number(data.price).toLocaleString()}</div>
                  <h1 class="property-title">${data.title}</h1>
                  <div class="location-text">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    ${data.location}, ${data.city}
                  </div>
                </div>

                <div class="highlight-grid">
                  <div class="highlight-item">
                    <span class="highlight-label">Type</span>
                    <span class="highlight-value">${data.property_type}</span>
                  </div>
                  <div class="highlight-item">
                    <span class="highlight-label">City</span>
                    <span class="highlight-value">${data.city}</span>
                  </div>
                  <div class="highlight-item">
                    <span class="highlight-label">Status</span>
                    <span class="highlight-value" style="color: var(--primary);">Active</span>
                  </div>
                </div>

                <div class="description-box">
                  <h3>About this property</h3>
                  <p style="white-space: pre-wrap;">${data.description}</p>
                </div>
                
                <div style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border-color); color: var(--text-light); font-size: 0.9rem; display: flex; justify-content: space-between;">
                  <span>Listed on ${new Date(data.created_at).toLocaleDateString()}</span>
                  <span>Property ID: #${data.id}</span>
                </div>
              </div>

              <aside class="sidebar">
                <div class="agent-card-premium">
                  <div class="agent-img">👤</div>
                  <div class="agent-info">
                    <h3>${data.publisher_name || 'Verified Agent'}</h3>
                    <p>Zameen Authorized Partner</p>
                  </div>
                  
                  <div class="action-buttons">
                    ${data.lock_phone ? 
                      `<button class="btn btn-outline contact-btn" disabled style="opacity: 0.6; cursor: not-allowed; border-color: var(--text-light); color: var(--text-light);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Phone Hidden
                      </button>` : 
                      `<button class="btn btn-primary contact-btn" onclick="this.innerHTML='📞 ' + '${data.publisher_phone || 'N/A'}'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        Show Phone Number
                      </button>`
                    }

                    ${data.lock_email ?
                      `<button class="btn btn-outline contact-btn" disabled style="opacity: 0.6; cursor: not-allowed;">
                        Email Hidden
                      </button>` :
                      `<a href="mailto:${data.publisher_email}" class="btn btn-outline contact-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        Send Inquiry
                      </a>`
                    }
                  </div>
                  
                  <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted); background: var(--bg-main); padding: 1rem; border-radius: var(--radius-md);">
                    <p style="margin:0;">Safety Tip: Never pay in advance without visiting the property and verifying documents.</p>
                  </div>
                </div>
                
                <div style="margin-top: 2rem; text-align: center;">
                    <a href="buy.html" style="color: var(--text-muted); font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                        Back to Search Results
                    </a>
                </div>
              </aside>
            </div>
          `;
        } catch (err) {
          console.error(err);
          container.innerHTML = '<div style="text-align:center; padding: 5rem 2rem;"><h2 style="color: red;">Failed to load property details.</h2><p>Please check your internet connection or try again later.</p></div>';
        }
      }, 300);
    };

    window.updateMainImage = function(src, el) {
      const mainImg = document.getElementById('main-img-view');
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = src;
        mainImg.style.opacity = '1';
      }, 300);
      
      document.querySelectorAll('.thumbnail-item').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initProperty);
    } else {
      initProperty();
    }
  </script>
</body>
</html>
