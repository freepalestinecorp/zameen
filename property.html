<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Property Details - Zameen.com Clone</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    .property-detail-container { max-width: 1200px; margin: 2rem auto; padding: 0 5%; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .gallery { margin-bottom: 2.5rem; }
    .main-image-container { position: relative; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-lg); height: 500px; }
    .main-image-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .main-image-container:hover img { transform: scale(1.02); }
    .thumbnails { display: flex; gap: 1rem; overflow-x: auto; margin-top: 1rem; padding-bottom: 0.5rem; }
    .thumbnails::-webkit-scrollbar { height: 6px; }
    .thumbnails::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: var(--radius-full); }
    .thumbnails img { width: 120px; height: 90px; object-fit: cover; border-radius: var(--radius-md); cursor: pointer; border: 2px solid transparent; transition: var(--transition); opacity: 0.7; }
    .thumbnails img:hover, .thumbnails img.active { border-color: var(--primary); opacity: 1; transform: translateY(-2px); }
    .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2.5rem; }
    .detail-card { background: var(--bg-panel); padding: 2.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.05); }
    .price-tag { font-size: 2.8rem; color: var(--primary); font-weight: 800; margin-bottom: 1.5rem; letter-spacing: -1px; }
    .agent-card { text-align: center; position: sticky; top: 100px; height: fit-content; }
    .agent-avatar { width: 90px; height: 90px; border-radius: 50%; background: var(--primary-light); margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--primary); box-shadow: 0 4px 10px rgba(0, 166, 81, 0.2); }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } .main-image-container { height: 350px; } }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--primary)"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        Zameen
      </a>
      <div class="nav-links">
        <a href="buy.html">Buy</a>
        <a href="sell.html">Sell / Rent</a>
        <a href="index.html#projects">New Projects</a>
        <a href="dashboard.html">Dashboard</a>
      </div>
      <div id="auth-nav-container" style="display: flex; gap: 1rem; align-items: center;">
        <a href="sell.html" class="btn btn-primary" style="padding: 0.5rem 1rem;">List Property</a>
        <button id="nav-login-btn" class="btn btn-outline" style="padding: 0.5rem 1rem;" onclick="toggleModal('loginModal')">Login</button>
      </div>
    </div>
  </nav>

  <!-- Login Modal -->
  <div class="modal-overlay" id="loginModal"></div>

  <main class="property-detail-container" id="detail-view">
    <h2 style="text-align: center; margin-top: 5rem; color: var(--text-muted);">Loading Property Details...</h2>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/main.js"></script>
  <script>
    const initProperty = function() {
      setTimeout(async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const propId = urlParams.get('id');
        const container = document.getElementById('detail-view');

        if (!propId) {
          container.innerHTML = '<h2 style="text-align:center; margin-top: 5rem; color: red;">Property Not Found</h2>';
          return;
        }

        try {
          const { data, error } = await sb.from('properties').select('*').eq('id', propId).single();
          if (error) throw error;

          // Attempt to increment views
          try {
             const currentViews = data.views || 0;
             await sb.from('properties').update({ views: currentViews + 1 }).eq('id', propId);
          } catch (e) {
             console.log("Could not update views, column might not exist yet.");
          }

          const images = data.image_url ? data.image_url.split(',') : ['https://images.unsplash.com/photo-1512917774080-9991f1c4c750?ixlib=rb-4.0.3'];
          
          let thumbnailsHtml = images.map((img, idx) => `
            <img src="${img}" onclick="document.getElementById('main-img').src='${img}'; document.querySelectorAll('.thumbnails img').forEach(el=>el.classList.remove('active')); this.classList.add('active');" alt="thumbnail ${idx+1}" class="${idx === 0 ? 'active' : ''}">
          `).join('');

          container.innerHTML = `
            <div style="margin-bottom: 2rem;">
              <div style="display:flex; align-items:center; gap: 1rem; margin-bottom: 1rem;">
                <span class="badge" style="position:relative; top:0; left:0; display:inline-block;">For ${data.purpose}</span>
                <span style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">Added ${new Date(data.created_at).toLocaleDateString()}</span>
                <span style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500; margin-left: auto;">👁️ ${data.views || 0} views</span>
              </div>
              <h1 style="font-size: 2.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.5rem; letter-spacing: -0.5px;">${data.title}</h1>
              <p style="color: var(--text-muted); font-size: 1.15rem; display:flex; align-items:center; gap: 0.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                ${data.location}, ${data.city}
              </p>
            </div>
            
            <div class="gallery">
              <div class="main-image-container">
                <img id="main-img" src="${images[0]}">
              </div>
              ${images.length > 1 ? `<div class="thumbnails">${thumbnailsHtml}</div>` : ''}
            </div>

            <div class="detail-grid">
              <div class="detail-card" style="padding: 3rem;">
                <div class="price-tag">PKR ${Number(data.price).toLocaleString()}</div>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; background: var(--bg-main); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                  <div>
                    <strong style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Type</strong>
                    <div style="font-size: 1.1rem; font-weight: 600; margin-top: 0.25rem;">${data.property_type}</div>
                  </div>
                  <div>
                    <strong style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">City</strong>
                    <div style="font-size: 1.1rem; font-weight: 600; margin-top: 0.25rem;">${data.city}</div>
                  </div>
                  <div>
                    <strong style="color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.5px;">Status</strong>
                    <div style="font-size: 1.1rem; font-weight: 600; margin-top: 0.25rem; color: var(--primary);">Available</div>
                  </div>
                </div>
                
                <h3 style="font-size: 1.5rem; margin-bottom: 1rem; color: var(--text-main);">Description</h3>
                <div style="line-height: 1.8; color: var(--text-muted); white-space: pre-wrap; font-size: 1.05rem;">${data.description}</div>
              </div>

              <div class="detail-card agent-card">
                <div class="agent-avatar">👤</div>
                <h3 style="font-size: 1.4rem; margin-bottom: 0.25rem;">${data.publisher_name || 'Verified Agent'}</h3>
                <p style="color: var(--primary); font-weight: 500; margin-bottom: 2rem;">Property Consultant</p>
                
                ${data.lock_phone ? 
                  `<button class="btn btn-primary" disabled style="width: 100%; margin-bottom: 1rem; opacity: 0.7; cursor: not-allowed; background: var(--text-muted); box-shadow: none;">🔒 Phone Hidden</button>` : 
                  `<button class="btn btn-primary" style="width: 100%; margin-bottom: 1rem; display: flex; justify-content: center; align-items: center; gap: 0.5rem;" onclick="this.innerHTML='📞 ${data.publisher_phone || 'Not Provided'}'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    View Phone Number
                  </button>`
                }
                
                ${data.lock_email ?
                  `<button class="btn btn-outline" disabled style="width: 100%; opacity: 0.7; cursor: not-allowed;">🔒 Email Hidden</button>` :
                  `<button class="btn btn-outline" style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 0.5rem;" onclick="window.location.href='mailto:${data.publisher_email}'">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Send Email
                  </button>`
                }
              </div>
            </div>
          `;
        } catch (err) {
          console.error(err);
          container.innerHTML = '<h2 style="text-align:center; margin-top: 5rem; color: red;">Failed to load property details.</h2>';
        }
      }, 500);
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initProperty);
    } else {
      initProperty();
    }
  </script>
</body>
</html>
